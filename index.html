<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário Discord</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Fundo de bolinhas vermelhas */
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .particle {
      position: absolute;
      background: #ff2222;
      border-radius: 50%;
      box-shadow: 0 0 8px #ff5555;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-100px); }
      100% { transform: translateY(calc(100vh + 100px)); }
    }

    /* Caixa principal - tamanho justo */
    .main-box {
      position: relative;
      z-index: 2;
      background: rgba(20, 20, 20, 0.95);
      padding: 45px 50px;
      border-radius: 16px;
      border: 3px solid #000000;
      width: 100%;
      max-width: 620px;
      text-align: center;
    }

    .main-box h2 {
      color: #ff4444;
      margin-bottom: 30px;
      font-size: 24px;
    }

    .main-box ol {
      list-style: none;
      counter-reset: item;
      text-align: left;
      max-width: 520px;
      margin: 0 auto;
    }

    .main-box li {
      counter-increment: item;
      margin-bottom: 25px;
      padding-left: 38px;
      font-size: 17.5px;
      line-height: 1.5;
      position: relative;
    }

    .main-box li:before {
      content: counter(item) ".";
      color: #ff4444;
      font-weight: bold;
      position: absolute;
      left: 0;
      width: 30px;
    }

    /* Input do Discord direto embaixo do texto 1. */
    .discord-input-container {
      margin-top: 8px;
      margin-bottom: 30px;
      padding: 18px;
      background: #1a1a1a;
      border: 2px solid #444;
      border-radius: 12px;
    }

    .discord-input-container label {
      display: block;
      color: #ff6666;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .discord-input {
      width: 100%;
      padding: 15px;
      background: #111;
      color: white;
      border: 2px solid #666;
      border-radius: 10px;
      font-size: 17px;
      text-align: center;
    }

    .discord-input:focus {
      border-color: #ff4444;
      outline: none;
    }

    .btn {
      padding: 15px 50px;
      background: #ff2222;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff5555;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <!-- Fundo animado -->
  <div class="background" id="background"></div>

  <!-- Caixa principal -->
  <div class="main-box">
    <h2>Instruções</h2>
    
    <ol>
      <li>
        <strong>Bote o seu nick do Discord aqui para começar o formulário!</strong>
        
        <!-- Input direto embaixo do texto 1. -->
        <div class="discord-input-container">
          <label for="discord-nick">Seu Nick do Discord:</label>
          <input type="text" id="discord-nick" class="discord-input" placeholder="Ex: Victor#1234 ou Victor" maxlength="50">
        </div>
      </li>
      
      <li>Segundo item da lista</li>
      <li>Terceiro item da lista</li>
      <li>Quarto item da lista</li>
      <li>Quinto item da lista</li>
      <li>Sexto item da lista</li>
      <li>Sétimo item da lista</li>
      <li>Oitavo item da lista</li>
      <li>Nono item da lista</li>
    </ol>

    <button class="btn" onclick="continuar()">Continuar</button>
  </div>

  <script>
    const background = document.getElementById('background');

    function createParticle() {
      const particle = document.createElement('div');
      particle.classList.add('particle');

      const size = Math.random() * 14 + 5;
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;

      particle.style.left = `${Math.random() * 100}vw`;
      const duration = Math.random() * 9 + 8;
      particle.style.animationDuration = `${duration}s`;
      particle.style.animationDelay = `-${Math.random() * 15}s`;
      particle.style.opacity = Math.random() * 0.4 + 0.65;

      background.appendChild(particle);

      setTimeout(() => particle.remove(), (duration + 3) * 1000);
    }

    function startAnimation() {
      setInterval(() => {
        for (let i = 0; i < 3; i++) {
          createParticle();
        }
      }, 90);
    }

    startAnimation();

    for (let i = 0; i < 90; i++) {
      createParticle();
    }

    function continuar() {
      const nick = document.getElementById('discord-nick').value.trim();
      if (nick === "") {
        alert("Por favor, digite seu nick do Discord para continuar!");
      } else {
        alert("Nick do Discord salvo: " + nick + "\n\n(Formulário continuaria aqui)");
      }
    }
  </script>

</body>
</html>
